<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F7FAFF"/>
      <stop offset="1" stop-color="#EEF4FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#1D2B4F" flood-opacity="0.14"/>
    </filter>
    <style>
      .title{font:700 54px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .sub{font:400 26px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#526071}
      .cardTitle{font:700 30px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#172033}
      .cardText{font:400 22px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#526071}
      .tag{font:700 20px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#1677FF}
      .small{font:400 18px -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Arial,sans-serif;fill:#6B7785}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="130" r="150" fill="#E5F0FF"/>
  <circle cx="235" cy="760" r="190" fill="#FFF3E6"/>
  <text x="120" y="110" class="title">AI 产品 Demo 设计与评审 Skill Suite</text>
  <text x="120" y="156" class="sub">把 AI 生成 Demo 控制在公司组件、Design Token、交互状态和产品化评审标准内</text>
  <rect x="560" y="275" width="480" height="230" rx="28" fill="#FFFFFF" filter="url(#shadow)"/>
  <rect x="610" y="325" width="380" height="42" rx="21" fill="#EAF3FF"/>
  <text x="655" y="354" class="tag">统一规范控制层</text>
  <text x="640" y="420" class="cardTitle">组件库 / Design Token 映射</text>
  <text x="640" y="462" class="cardText">PC 组件 · App 组件 · Token · 状态</text>
  <text x="640" y="500" class="small">所有生成与审核都引用同一套标准</text>
  <line x1="560" y1="390" x2="410" y2="250" stroke="#B6C6DB" stroke-width="4"/>
  <line x1="560" y1="430" x2="410" y2="650" stroke="#B6C6DB" stroke-width="4"/>
  <line x1="1040" y1="390" x2="1190" y2="250" stroke="#B6C6DB" stroke-width="4"/>
  <line x1="1040" y1="430" x2="1190" y2="650" stroke="#B6C6DB" stroke-width="4"/>
  <rect x="120" y="185" width="360" height="190" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="160" y="245" class="cardTitle">1. 总介绍</text>
  <text x="160" y="292" class="cardText">团队只看一个入口</text>
  <text x="160" y="326" class="small">知道何时用 PC / App / 审核</text>
  <rect x="1120" y="185" width="360" height="190" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="1160" y="245" class="cardTitle">2. PC Demo 生成前</text>
  <text x="1160" y="292" class="cardText">发给 IDE Agent</text>
  <text x="1160" y="326" class="small">中后台、表格、表单、弹窗、抽屉</text>
  <rect x="120" y="565" width="360" height="190" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="160" y="625" class="cardTitle">3. App Demo 生成前</text>
  <text x="160" y="672" class="cardText">发给 IDE Agent</text>
  <text x="160" y="706" class="small">移动任务、卡片、单元格、底部操作</text>
  <rect x="1120" y="565" width="360" height="190" rx="24" fill="#FFFFFF" filter="url(#shadow)"/>
  <text x="1160" y="625" class="cardTitle">4. Demo 生成后审核</text>
  <text x="1160" y="672" class="cardText">发给 IDE Agent 走查</text>
  <text x="1160" y="706" class="small">P0 / P1 / P2 · 准入结论 · 留痕</text>
  <rect x="495" y="690" width="610" height="78" rx="20" fill="#172033"/>
  <text x="535" y="738" style="font:700 26px -apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',Arial,sans-serif;fill:#FFFFFF">交付物：4 个可直接复制投喂的 MD 文档</text>
  <circle cx="520" cy="390" r="10" fill="#1677FF"/>
  <circle cx="1080" cy="390" r="10" fill="#1677FF"/>
  <circle cx="520" cy="430" r="10" fill="#FF7A00"/>
  <circle cx="1080" cy="430" r="10" fill="#FF7A00"/>
</svg>

