    .pipeline-head{display:grid;grid-template-columns:110px repeat(3,1fr);gap:16px;align-items:end}.big-percent{font-size:48px;color:var(--ud-brand);font-weight:700}.current-line{color:var(--ud-text-2);margin:8px 0 18px}.task-list{display:grid;gap:14px}.task{display:grid;grid-template-columns:52px 1fr 80px;gap:16px;align-items:center;padding:16px;border:1px solid var(--ud-border);border-radius:12px;background:#f8f9fb}.task.done{border-color:#b9edc7;background:var(--ud-success-light)}.task.active{border-color:var(--ud-brand);background:var(--ud-brand-light)}.task strong{font-size:18px}.task p{margin:5px 0 10px;color:var(--ud-text-3);font-size:13px}.task-status{text-align:right;font-size:14px}.spin{width:18px;height:18px;border:2px solid #a6c8ff;border-top-color:var(--ud-brand);border-radius:50%;animation:spin 1s linear infinite;display:inline-block}@keyframes spin{to{transform:rotate(360deg)}}

    .risk-card{border:1px solid #cddbf0;border-left:5px solid var(--ud-brand);border-radius:8px;padding:20px;margin-top:20px}.risk-head{display:flex;justify-content:space-between;align-items:center}.risk-card h3{margin:10px 0}.evidence{background:#f8fafc;border:1px solid #d7e0ef;border-radius:8px;padding:14px;margin-top:10px}.evidence small{display:block;color:#8da0bb;margin-bottom:6px}
    .tabs{display:flex;gap:12px;border-bottom:1px solid var(--ud-divider);margin:16px 0}.tab{border:0;background:transparent;padding:10px 4px;color:var(--ud-text-2)}.tab.active{color:var(--ud-brand);border-bottom:2px solid var(--ud-brand);font-weight:600}.vendor-tabs{display:flex;gap:12px;flex-wrap:wrap}.vendor{border:1px solid #d7e0ef;border-radius:6px;background:#f7f9fc;padding:10px 16px}.vendor.active{border-color:var(--ud-brand);color:var(--ud-brand);background:#fff}
    .criteria{display:grid;gap:12px}.criterion{border:1px solid #d7e0ef;border-radius:8px;padding:16px}.criterion h3{font-size:16px;margin:0 0 10px}.criterion p{background:#f7f9fc;border:1px solid #d7e0ef;border-radius:6px;padding:12px;color:#53657e;margin:0}
    .extract-layout{display:grid;grid-template-columns:548px 1fr;gap:24px}.document-preview{height:696px;border:1px solid var(--ud-border);border-radius:12px;padding:40px;background:linear-gradient(#fff,#fbfbfb);position:relative;overflow:hidden}.document-preview h1{text-align:center;font-size:48px;letter-spacing:12px;margin:140px 0 30px}.document-preview h3{text-align:center}.doc-fields{margin:80px auto 0;width:330px;line-height:36px}.wave{position:absolute;left:-40px;bottom:-90px;width:700px;height:190px;border-radius:50%;background:linear-gradient(20deg,#65a8ff,#004ee8);transform:rotate(8deg)}.parse-panel{border:1px solid var(--ud-border);border-radius:12px;overflow:hidden}.parse-step{padding:18px 20px;border-bottom:1px solid var(--ud-divider)}.parse-step h3{font-size:16px;margin:0 0 12px}.parse-step p{font-size:14px;color:var(--ud-text-2);margin:8px 0}.parse-step:last-child{border-bottom:0}
    .extract-result{display:grid;grid-template-columns:1fr 1fr;gap:16px}.field-card{border:1px solid var(--ud-border);border-radius:8px;padding:14px}.field-card span{font-size:13px;color:var(--ud-text-3)}.field-card b{display:block;margin-top:6px}.field-card.warn{border-color:#f3cf96;background:#fffaf0}
    .drawer-mask{position:absolute;inset:0;background:rgba(0,0,0,.58);z-index:40}.drawer{position:absolute;right:0;top:0;width:1070px;height:900px;background:#fff;z-index:41;box-shadow:-8px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column}.drawer-head{height:56px;border-bottom:1px solid var(--ud-divider);padding:0 18px;display:flex;align-items:center;justify-content:space-between;font-weight:600}.drawer-body{padding:24px;overflow:auto;flex:1}.drawer-foot{height:60px;border-top:1px solid var(--ud-divider);display:flex;align-items:center;justify-content:space-between;padding:0 24px}.check-group{border:1px solid var(--ud-border);border-radius:10px;overflow:hidden;margin-top:16px}.check-title{padding:12px 16px;background:#fafafa;border-bottom:1px solid var(--ud-divider);font-weight:600}.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;padding:16px}.check-item{border:1px solid var(--ud-border);border-radius:8px;padding:14px}.check-item label{display:flex;gap:10px;align-items:flex-start}.check-item p{margin:8px 0 0 25px}.check-item .tag{margin-right:6px}

    .host-page{background:#f6f7fa}.host-grid{display:grid;grid-template-columns:220px 1fr;height:744px}.host-side{border-right:1px solid #ddd;padding:20px;background:#fff}.host-side div{padding:12px;color:#555}.host-side .active{color:#1677ff;background:#eaf3ff}.host-main{padding:20px}.host-banner{background:#fff;border-radius:6px;padding:20px}.host-content{background:#fff;margin-top:12px;padding:20px;min-height:530px}.form-table{width:100%;border-collapse:collapse}.form-table td{border:1px solid #ddd;padding:12px}.form-table td:nth-child(odd){background:#f5f5f5;text-align:right;width:18%}.ai-label{display:inline-block;background:#eef4ff;color:#1677ff;border-radius:3px;padding:2px 6px;font-size:12px;margin-left:6px}
    .hidden{display:none!important}

<body>
  <div class="stage" id="stage">
    <aside class="control" id="control">
      <div class="control-title"><span>DEMO</span><b>演示控制台</b></div>
      <h2>完整流程演示</h2>
      <p>控制区位于云随工作台之外，可隐藏后对照 Figma 画板。</p>
      <div class="control-section">
        <span class="control-label">项目阶段</span>
        <div class="control-grid" id="stageButtons"></div>
      </div>
      <div class="control-section">
        <span class="control-label">身份</span>
        <div class="control-grid" id="roleButtons"></div>
      </div>
      <div class="control-section">
        <span class="control-label">页面</span>
        <select id="shortcut"></select>
      </div>
      <button class="hide-control" onclick="toggleControl(false)" title="隐藏演示控制台">×</button>
    </aside>
    <button class="control-handle" id="controlHandle" onclick="toggleControl(true)">DEMO 演示控制台</button>
    <main class="workbench" id="workbench"></main>
    <div class="toast" id="toast"></div>
  </div>
  <input class="file-picker" id="filePicker" type="file" accept=".pdf,.doc,.docx" />
  <script>
  (()=>{
    const STAGES=['需求确定','文件编制','开标流程','评标','履约'];
    const ROLES=['采购人/代理机构','评审专家'];
    const SERVICES=[
      {id:'extract',title:'采购文件提取',desc:'从招标文件识别字段，回填业务表单',icon:'file',stages:['文件编制']},
      {id:'inspect',title:'采购文件检测',desc:'根据业务需求执行检测服务，结果内联到字段',icon:'shield',stages:['文件编制']},
      {id:'recommend',title:'内容推荐',desc:'评分办法 / 资格审查 / 符合性审查',icon:'article',stages:['文件编制']},
      {id:'collusion',title:'围串标审查',desc:'智能识别围标串标行为，多维度异常分析',icon:'eye',stages:['开标流程']},
      {id:'evaluate',title:'辅助评标',desc:'AI 辅助评审投标文件，智能评分建议与对比分析',icon:'task',stages:['评标'],expert:true}
    ];
    const project={
      name:'机关单位办公设备批量采购项目（模拟项目）',code:'ZF-MN-20260626',method:'公开招标',buyer:'XX市政务服务中心（模拟）',agency:'XX工程咨询管理有限公司（模拟）',budget:'288,000.00',deadline:'2026-07-17 10:00',delivery:'15个日历日'
    };
    const state={stage:'文件编制',role:ROLES[0],page:'home',service:null,progress:30,timer:null,drawer:false};
    const shortcuts=[
      ['home','首页服务矩阵'],['extract-upload','采购文件提取｜上传'],['extract-loading','采购文件提取｜处理中'],['extract-result','采购文件提取｜结果'],['extract-fail','采购文件提取｜失败'],
      ['inspect-wait','采购文件检测｜等待业务请求'],['inspect-ready','采购文件检测｜材料就绪'],['inspect-loading','采购文件检测｜处理中'],['inspect-result','采购文件检测｜结果'],
      ['collusion-ready','围串标审查｜可发起'],['collusion-loading','围串标审查｜处理中'],['collusion-result','围串标审查｜结果'],
      ['evaluate-ready','辅助评标｜等待开启'],['evaluate-loading','辅助评标｜处理中'],['evaluate-result','辅助评标｜结果'],
      ['queue','特殊状态｜并发排队'],['timeout','特殊状态｜执行超时'],['history','特殊状态｜历史无记录'],['unavailable','特殊状态｜阶段不可用'],
      ['host-tip','宿主改造｜免费使用提示'],['host-filled','宿主改造｜AI已回填']
    ];

    const icon=(name,size=28)=>{
      const common=`width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"`;
      const paths={
        file:'<path d="M6 2h8l4 4v16H6z"/><path d="M14 2v5h5M9 12h6M9 16h6"/>',
        shield:'<path d="M12 2l8 3v6c0 5-3.5 9-8 11-4.5-2-8-6-8-11V5z"/><path d="M9 12l2 2 4-5"/>',
        article:'<path d="M5 3h14v18H5z"/><path d="M8 8h8M8 12h5M8 16h7"/>',
        eye:'<path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12z"/><circle cx="12" cy="12" r="2.5"/>',
        task:'<path d="M7 3h10v4H7z"/><path d="M5 5h14v17H5zM8 11h8M8 15h8M8 19h5"/>',
        user:'<circle cx="12" cy="8" r="3"/><path d="M5 21c.5-5 3-7 7-7s6.5 2 7 7"/>',
        upload:'<path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 15v5h16v-5"/>',
        folder:'<path d="M3 6h7l2 2h9v11H3z"/>',
        search:'<circle cx="10" cy="10" r="6"/><path d="M15 15l6 6"/>'
      };return `<svg ${common}>${paths[name]||paths.file}</svg>`;
    };
    const logo=()=>`<svg class="logo" viewBox="0 0 24 28" fill="none" aria-hidden="true"><path d="M12 1l2.5 5.2L20 8.5l-5.5 2.2L12 16l-2.5-5.3L4 8.5l5.5-2.3L12 1z" fill="white"/><path d="M2 17c3 1.7 6.5 2.5 10 2.5S19 18.7 22 17c-1 6-4.5 9-10 9S3 23 2 17z" fill="white"/></svg>`;
    const illus=(type)=>{

    function startLoading(service){
      state.progress=30;
      if(service==='采购文件提取')state.page='extract-loading';else if(service==='采购文件检测')state.page='inspect-loading';else if(service==='围串标审查')state.page='collusion-loading';else if(service==='辅助评标')state.page='evaluate-loading';else state.page='recommend-result';
      render();
    }
    function startProgress(next){
      let p=30,elapsed=41;
      state.timer=setInterval(()=>{p=Math.min(100,p+10);elapsed+=8;state.progress=p;const big=document.getElementById('bigPercent'),active=document.getElementById('activePercent'),bar=document.getElementById('activeBar'),el=document.getElementById('elapsed');if(big)big.textContent=p+'%';if(active)active.textContent=Math.min(100,p+50)+'%';if(bar)bar.style.width=Math.min(100,p+50)+'%';if(el)el.textContent=elapsed+'秒';if(p>=100){clearTimer();setTimeout(()=>openPage(next),450)}},650);
    }
    function clearTimer(){if(state.timer){clearInterval(state.timer);state.timer=null}}
    function openPage(page){state.page=page;render()}
    function goHome(){state.page='home';state.service=null;render()}
    function showUnavailable(service){state.service=service;state.page='unavailable';render()}
    function openDrawer(){state.drawer=true;const stage=document.getElementById('stage');stage.insertAdjacentHTML('beforeend',`<div class="drawer-mask" id="drawerMask"></div><div class="drawer" id="drawer"><div class="drawer-head"><span>手动选择审查项</span><button class="close-btn" style="color:#555" onclick="closeDrawer()">×</button></div><div class="drawer-body"><div class="section"><h3 class="section-title">推荐场景</h3><div class="inline" style="gap:10px;flex-wrap:wrap"><span class="tag">政府 ×</span><span class="tag">政府-公开招标 ×</span><span class="tag">政府-单一来源 ×</span><span class="tag">政府-竞争性磋商 ×</span><span class="tag">政府-竞争性谈判 ×</span></div></div>${[1,2,3,4,5,6].map((n,i)=>`<div class="check-group"><div class="check-title"><input type="checkbox" ${i<2?'checked':''}> 审查类别名称${n}</div>${i<2?`<div class="check-grid">${[1,2,3].map((x,j)=>`<div class="check-item"><label><input type="checkbox" ${j<2?'checked':''}><span>数字、金额、日期等关键信息是否存在书写错误</span></label><p><span class="tag">政府</span><span class="tag">公开招标</span></p></div>`).join('')}</div>`:''}</div>`).join('')}</div><div class="drawer-foot"><span>☑ 全选　已选中 98 项，共 100 项目</span><div class="actions">${btn('取消','closeDrawer()',false,'small')}${btn('确定','closeDrawer()',true,'small')}</div></div></div>`);}
    function closeDrawer(){document.getElementById('drawer')?.remove();document.getElementById('drawerMask')?.remove();state.drawer=false}
    function showToast(message){const t=document.getElementById('toast');t.innerHTML=message;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3200)}
    function toggleControl(show){document.getElementById('control').style.display=show?'block':'none';document.getElementById('controlHandle').style.display=show?'none':'block'}
    function setStage(s){state.stage=s;goHome()}
    function setRole(r){state.role=r;goHome()}
    function refreshControls(){
      document.getElementById('stageButtons').innerHTML=STAGES.map(s=>`<button class="${s===state.stage?'active':''}" onclick="setStage('${s}')">${s}</button>`).join('');
      document.getElementById('roleButtons').innerHTML=ROLES.map(r=>`<button class="${r===state.role?'active':''}" onclick="setRole('${r}')">${r}</button>`).join('');
      const sel=document.getElementById('shortcut');sel.innerHTML=shortcuts.map(x=>`<option value="${x[0]}" ${x[0]===state.page?'selected':''}>${x[1]}</option>`).join('');
    }
    function fit(){document.documentElement.style.setProperty('--scale',Math.min(window.innerWidth/1440,window.innerHeight/900).toFixed(4))}
    Object.assign(window,{openService,startLoading,openPage,goHome,showUnavailable,openDrawer,closeDrawer,showToast,toggleControl,setStage,setRole});
    document.getElementById('shortcut').addEventListener('change',e=>openPage(e.target.value));
    document.getElementById('filePicker').addEventListener('change',()=>startLoading('采购文件提取'));
    window.addEventListener('resize',fit);fit();render();
  })();
  </script>
</body>
</html>
